spring.application.name=Sistemas-Para-Panaderia-BackEnd
# ==========================================
# 1. CONEXIÓN A LA BASE DE DATOS MYSQL
# ==========================================
# 'bd_briselli' será el nombre de tu base de datos
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/bd_briselli?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}

# Tu usuario de MySQL (por defecto en local suele ser 'root')
spring.datasource.username=${DB_USER:root}

# REEMPLAZA ESTO por la contraseña real de tu motor MySQL
spring.datasource.password=${DB_PASSWORD:}

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==========================================
# 2. CONFIGURACIÓN DE JPA / HIBERNATE
# ==========================================
# 'update' es clave en desarrollo: Hibernate creará las tablas automáticamente si no existen
spring.jpa.hibernate.ddl-auto=update

# Mostrar las consultas SQL en la consola del IDE (te salvará la vida al debugear)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ==========================================
# 3. CONFIGURACIÓN DEL SERVIDOR
# ==========================================
server.port=${PORT:8080}

# ==========================================
# 4. CONFIGURACIÓN DE CORREO (SMTP GMAIL)
# ==========================================
spring.mail.host=smtp.gmail.com
spring.mail.port=465
spring.mail.username=${MAIL_USER:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.ssl.enable=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ==========================================
# 5. CONFIGURACIÓN DE CLOUDINARY
# ==========================================
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
cloudinary.api-key=${CLOUDINARY_API_KEY:}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:}

# ==========================================
# 6. CONFIGURACIÓN DE CULQI
# ==========================================
culqi.secret-key=${CULQI_SECRET_KEY:}

# ==========================================
# 7. CONFIGURACIÓN DE JWT
# ==========================================
jwt.secret=${JWT_SECRET:}